services:
  - type: web
    name: gastos-choferes
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: ADMIN_PASSWORD
        sync: false
      - key: MASTER_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
