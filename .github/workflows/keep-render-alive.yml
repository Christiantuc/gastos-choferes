# Evita que Render (plan gratis) duerma la app por inactividad.
# Render apaga el servicio tras ~15 min sin visitas; este ping corre cada 10 min.
name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Despertar app en Render
        run: |
          curl -fsS --max-time 90 \
            "https://gastos-choferes.onrender.com/health" \
            | grep -q '"status"'
