<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gastos Transporte Frios del Norte - Ingreso</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
  <div class="container py-5">
    <h1 class="text-center mb-4">Gastos Transporte Frios del Norte</h1>
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title mb-3">Ingreso de Empleado</h5>
            {% if error %}
            <div class="alert alert-danger py-2">{{ error }}</div>
            {% endif %}
            <form method="POST">
              <div class="mb-3">
                <label class="form-label">DNI</label>
                <input type="text" name="dni" class="form-control" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Teléfono</label>
                <input type="tel" name="phone" class="form-control" required />
              </div>
              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Ingresar</button>
                <a href="{{ url_for('admin_login') }}" class="btn btn-outline-secondary">Soy Administrador</a>
                <a href="{{ url_for('master_login') }}" class="btn btn-outline-dark">Soy Master</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
